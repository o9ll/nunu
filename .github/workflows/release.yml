# Based partially on Alyxia's work, thanks so much!

name: Release
on:
  push:
    tags:
      - v*

env:
  FORCE_COLOR: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          path-type: inherit

      - name: Install Windows dependencies
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm git mingw-w64-x86_64-gcc mingw-w64-x86_64-SDL2

      - name: Install Go dependencies
        shell: msys2 {0}
        run: |
          go get -v
          go install github.com/tc-hib/go-winres@latest

      - name: Build GUI
        shell: msys2 {0}
        run: |
          go-winres make --product-version "git-tag"
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -v -tags "static gui" -ldflags "-s -w -H=windowsgui -extldflags=-static -X 'nunu/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'nunu/buildinfo.InstallerTag=${{ github.ref_name }}'" -o Nun.exe

      - name: Build CLI
        shell: msys2 {0}
        run: |
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -v -tags "cli" -ldflags "-s -w -X 'nunu/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'nunu/buildinfo.InstallerTag=${{ github.ref_name }}'" -o NunCli.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nun-windows
          path: |
            Nun.exe
            NunCli.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-windows]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: "Download Windows Artifacts"
        uses: actions/download-artifact@v8
        with:
          name: Nun-windows
          path: windows

      - name: Delete existing release
        run: gh release delete "${{ github.ref_name }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create the release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          make_latest: ${{ !contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          draft: false
          body: |
            This is release ${{ github.ref_name }} of Nun.
          files: |
            windows/Nun*.exe
