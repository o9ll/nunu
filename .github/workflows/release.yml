# Based partially on Alyxia's work, thanks so much!

name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v2.2.5). Leave empty to auto-increment from the latest tag."
        required: false
        type: string

env:
  FORCE_COLOR: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            TAG="${{ inputs.version }}"
          else
            EXISTING_TAG="$(git tag --points-at HEAD --list 'v*' | head -1)"
            if [[ -n "$EXISTING_TAG" ]]; then
              TAG="$EXISTING_TAG"
            else
              LATEST="$(git tag -l 'v[0-9]*' --sort=-v:refname | head -1)"
              if [[ -z "$LATEST" ]]; then
                TAG="v0.0.1"
              else
                NUM="${LATEST#v}"
                PREFIX="${NUM%.*}"
                LAST="${NUM##*.}"
                TAG="v${PREFIX}.$((LAST + 1))"
              fi
            fi
          fi

          if [[ ! "$TAG" =~ ^v ]]; then
            TAG="v${TAG}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"

  build-windows:
    runs-on: windows-latest
    needs: prepare

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          path-type: inherit

      - name: Install Windows dependencies
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm git mingw-w64-x86_64-gcc mingw-w64-x86_64-SDL2

      - name: Install Go dependencies
        shell: msys2 {0}
        run: |
          go get -v
          go install github.com/tc-hib/go-winres@latest

      - name: Build GUI
        shell: msys2 {0}
        run: |
          go-winres make --product-version "${{ needs.prepare.outputs.tag }}"
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -v -tags "static gui" -ldflags "-s -w -H=windowsgui -extldflags=-static -X 'nunu/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'nunu/buildinfo.InstallerTag=${{ needs.prepare.outputs.tag }}'" -o Nun.exe

      - name: Build CLI
        shell: msys2 {0}
        run: |
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -v -tags "cli" -ldflags "-s -w -X 'nunu/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'nunu/buildinfo.InstallerTag=${{ needs.prepare.outputs.tag }}'" -o NunCli.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nun-windows
          path: |
            Nun.exe
            NunCli.exe

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-windows]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: "Download Windows Artifacts"
        uses: actions/download-artifact@v8
        with:
          name: Nun-windows
          path: windows

      - name: Delete existing release
        run: gh release delete "${{ needs.prepare.outputs.tag }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create the release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          make_latest: ${{ !contains(needs.prepare.outputs.tag, '-') }}
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
          draft: false
          body: |
            This is release ${{ needs.prepare.outputs.tag }} of Nun.
          files: |
            windows/Nun*.exe
